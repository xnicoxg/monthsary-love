<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>For My Love ❤️</title>

<style>

body{
background:black;
margin:0;
overflow:hidden;
font-family:monospace;
color:#ff4d6d;
text-align:center;
}

h1{
margin-top:20px;
color:#ff4d6d;
text-shadow:0 0 10px #ff4d6d;
z-index:5;
position:relative;
}

/* PHOTO */
canvas{
display:block;
margin:auto;
max-width:650px;
width:90%;
height:auto;
position:relative;
z-index:0;
}

/* MESSAGE BOX */
#message{
position:fixed;
bottom:40px;
left:50%;
transform:translateX(-50%);
background:#ff4d6d;
color:white;
padding:20px 30px;
border-radius:25px;
display:none;
font-size:20px;
box-shadow:0 0 25px #ff4d6d;
z-index:10;
}

/* FLOATING HEARTS */
.heart{
position:fixed;
color:#ff4d6d;
animation:float 6s linear infinite;
pointer-events:none;
z-index:9;
}

@keyframes float{
from{
transform:translateY(100vh);
opacity:1;
}
to{
transform:translateY(-10vh);
opacity:0;
}
}

</style>
</head>

<body>

<h1>I Love You My Baby ❤️</h1>

<canvas id="canvas"></canvas>

<div id="message">
<span id="typing"></span>
</div>

<audio id="bgmusic" loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<script>

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const img = new Image();
img.src = "photo.jpg";

img.onload = function(){

canvas.width = img.width;
canvas.height = img.height;

ctx.drawImage(img,0,0);

const data = ctx.getImageData(0,0,canvas.width,canvas.height);
ctx.clearRect(0,0,canvas.width,canvas.height);

const text = "I LOVE YOU ";
const size = 12;

ctx.font = "bold " + size + "px monospace";

for(let y=0;y<canvas.height;y+=size){

for(let x=0;x<canvas.width;x+=size){

const index = (y * canvas.width + x) * 4;

const r = data.data[index];
const g = data.data[index+1];
const b = data.data[index+2];

const brightness = (r+g+b)/3;

if(brightness < 200){

ctx.fillStyle = `rgb(${r},${g},${b})`;

ctx.fillText(
text[(x+y)%text.length],
x,
y
);

}

}

}

}

/* CLICK EVENT */

canvas.onclick = function(){
document.getElementById("message").style.display="block";
typeMessage();
document.getElementById("bgmusic").play();
}

/* HEARTS */

function hearts(){

const heart=document.createElement("div");
heart.className="heart";

const words=["❤️","💕","I love you my baby Happy 8th monthsary 💕"];

heart.innerHTML=words[Math.floor(Math.random()*words.length)];

heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=(Math.random()*25+15)+"px";

document.body.appendChild(heart);

setTimeout(()=>heart.remove(),6000);

}

setInterval(hearts,300);

/* TYPING MESSAGE */

const message = "Happy 8th Monthsary my baby ❤️ Thank you for loving me and staying with me. Every moment with you is special and I love you so much.";

let i=0;

function typeMessage(){

const typing = document.getElementById("typing");

if(i < message.length){

typing.innerHTML += message.charAt(i);

i++;

setTimeout(typeMessage,50);

}

}

</script>

</body>
</html>
